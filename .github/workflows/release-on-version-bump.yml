name: Altals Release Trigger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: altals-release-trigger-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  create-release-tag:
    name: Create release tag from version bump
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect release trigger state
        id: release_state
        shell: bash
        run: |
          VERSION_FILES=(
            "package.json"
            "package-lock.json"
            "src-tauri/Cargo.toml"
            "src-tauri/Cargo.lock"
            "src-tauri/tauri.conf.json"
          )

          VERSION="$(node scripts/version-utils.mjs check)"
          TAG="v${VERSION}"
          LATEST_TAG_VERSION="$(node scripts/version-utils.mjs latest-tag)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists. Nothing to do."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION_CHANGED="false"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION_CHANGED="true"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            mapfile -t CHANGED_FILES < <(git diff --name-only "${{ github.event.before }}" "${GITHUB_SHA}")
            for target in "${VERSION_FILES[@]}"; do
              if printf '%s\n' "${CHANGED_FILES[@]}" | grep -Fx "$target" >/dev/null; then
                VERSION_CHANGED="true"
                break
              fi
            done
          fi

          if [ "${VERSION_CHANGED}" != "true" ]; then
            echo "Version files were not changed in this push. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${LATEST_TAG_VERSION}" ]; then
            COMPARISON="$(node scripts/version-utils.mjs compare "${VERSION}" "${LATEST_TAG_VERSION}")"
            if [ "${COMPARISON}" -lt 0 ]; then
              echo "Current version ${VERSION} is lower than latest tag v${LATEST_TAG_VERSION}."
              exit 1
            fi

            if [ "${COMPARISON}" -eq 0 ]; then
              echo "Current version ${VERSION} matches latest released tag v${LATEST_TAG_VERSION}. Skipping release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        if: steps.release_state.outputs.should_release == 'true'
        shell: bash
        run: |
          git tag -a "${{ steps.release_state.outputs.tag }}" -m "Release ${{ steps.release_state.outputs.tag }}"
          git push origin "${{ steps.release_state.outputs.tag }}"

      - name: Dispatch release workflow
        if: steps.release_state.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -f ref="${{ github.event.repository.default_branch }}" \
            -f inputs[tag]="${{ steps.release_state.outputs.tag }}"
