name: Altals Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Select the semantic version bump to apply
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: altals-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Releases must be created from ${{ github.event.repository.default_branch }}."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump project version
        id: bump
        shell: bash
        run: |
          VERSION="$(node scripts/bump-version.mjs "${{ inputs.bump }}")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate updated versions
        run: node scripts/version-utils.mjs check

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push release version
        shell: bash
        run: |
          git add package.json package-lock.json src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
          git push origin "${{ steps.bump.outputs.tag }}"

  build-release:
    name: Release (${{ matrix.label }})
    needs: prepare-release
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS ARM
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin --bundles app --no-sign
          - platform: ubuntu-22.04
            label: Linux
            rust-target: ""
            tauri-args: ""
          - platform: windows-latest
            label: Windows
            rust-target: ""
            tauri-args: ""

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate tag matches project version
        run: node scripts/version-utils.mjs check-tag "${{ needs.prepare-release.outputs.tag }}"

      - name: Verify GitHub auth origin is configured for release
        shell: bash
        run: |
          ORIGIN="${{ vars.VITE_GITHUB_AUTH_ORIGIN }}"

          if [ -z "$ORIGIN" ]; then
            echo "VITE_GITHUB_AUTH_ORIGIN is not configured."
            echo "Set it to your public GitHub OAuth bridge origin, for example https://your-project.vercel.app."
            exit 1
          fi

          case "$ORIGIN" in
            https://*) ;;
            *)
              echo "VITE_GITHUB_AUTH_ORIGIN must use https for public release builds."
              echo "Current value: $ORIGIN"
              exit 1
              ;;
          esac

          case "$ORIGIN" in
            https://localhost*|https://127.0.0.1*|http://localhost*|http://127.0.0.1*)
              echo "VITE_GITHUB_AUTH_ORIGIN cannot point at localhost for public release builds."
              echo "Current value: $ORIGIN"
              exit 1
              ;;
          esac

      - name: Install Rust toolchain
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: release-${{ matrix.label }}

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GITHUB_AUTH_ORIGIN: ${{ vars.VITE_GITHUB_AUTH_ORIGIN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.tauri-args }}
          tagName: ${{ needs.prepare-release.outputs.tag }}
          releaseName: Altals v${{ needs.prepare-release.outputs.version }}
          releaseBody: Download the Altals installer for your platform below.
          releaseDraft: false
          prerelease: false

      - name: Build helper DMG
        if: matrix.platform == 'macos-latest'
        id: helper_dmg
        shell: bash
        run: |
          DMG_PATH="$(node scripts/build-macos-dmg.mjs --target "${{ matrix.rust-target }}")"
          echo "path=${DMG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload helper DMG to release
        if: matrix.platform == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.prepare-release.outputs.tag }}" "${{ steps.helper_dmg.outputs.path }}" --clobber
